<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMS Billing Tracker — DataAlike</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1B2A45">
<link rel="apple-touch-icon" href="./icon.png">
<style>
:root{
  color-scheme: light;
  --navy:#1B2A45;
  --brand-orange:#EF892A;
  --accent:#D4621A;
  --silver:#A0A09F;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Helvetica Neue',Arial,sans-serif;
  background:#F0F2F8; min-height:100vh;
  color:#1A1D2E; font-size:14px; line-height:1.4;
  display:flex; flex-direction:column;
}
#app{ flex:1; display:flex; flex-direction:column; min-height:100vh; }
/* ── Header ── */
.header{
  background:var(--navy); color:#fff;
  padding:12px 20px; display:flex; align-items:center;
  justify-content:space-between; position:sticky; top:0; z-index:10;
}
.brand{display:flex;align-items:center;gap:11px;}
.brand-logo{height:34px;width:auto;display:block;}
.brand-fallback{
  width:34px;height:34px;border-radius:8px;background:var(--brand-orange);
  display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--navy);font-size:16px;
}
.brand-name{font-size:15px;font-weight:800;letter-spacing:-0.2px;color:#fff;}
.brand-name .da{color:var(--brand-orange);}
.brand-sub{font-size:10px;color:#B9C2D6;margin-top:1px;}
.hdr-right{display:flex;gap:10px;align-items:center;}

/* ── Tabs ── */
.tabs{background:#fff;border-bottom:1px solid #E2E5F0;padding:0 20px;display:flex;gap:2px;}
.tab-btn{
  cursor:pointer;background:none;border:none;font-family:inherit;
  padding:12px 16px;font-size:13px;font-weight:500;color:#6B7280;
  border-bottom:2.5px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:7px;
}
.tab-btn.active{font-weight:700;color:var(--accent);border-bottom-color:var(--accent);}
.tab-count{font-size:11px;font-weight:700;padding:1px 7px;border-radius:10px;background:#EEF0F6;color:#6B7280;}
.tab-btn.active .tab-count{background:#FBEADD;color:var(--accent);}
.tab-count.alert{background:#DC2626;color:#fff;}

.content{padding:18px 20px;max-width:940px;margin:0 auto;width:100%;flex:1;}
.footer{background:var(--navy);color:#B9C2D6;text-align:center;padding:14px 20px;font-size:11px;}
.footer .da{color:var(--brand-orange);font-weight:700;}

.card{background:#fff;border:1px solid #E2E5F0;border-radius:10px;overflow:hidden;margin-bottom:8px;}

/* ── Pills / buttons ── */
.filter-pill{cursor:pointer;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid #D1D5E0;background:none;color:#6B7280;font-family:inherit;}
.filter-pill.active{background:#FBEADD;color:var(--accent);border-color:var(--accent);}

.home-wrap{position:relative;}
.home-dropdown{
  position:absolute;top:calc(100% + 3px);left:0;right:0;z-index:200;
  background:#fff;border:1px solid #D1D5E0;border-radius:8px;
  box-shadow:0 6px 16px rgba(0,0,0,0.12);max-height:220px;overflow-y:auto;display:none;
}
.home-dropdown.open{display:block;}
.home-opt{padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #F4F5F8;}
.home-opt:last-child{border-bottom:none;}
.home-opt:hover,.home-opt.focused{background:#FBEADD;color:var(--accent);}

.batch-header{cursor:pointer;padding:13px 16px;display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;}
.batch-header:hover{background:#FAFBFD;}
.batch-body{border-top:1px solid #F0F2F8;padding:16px;display:flex;flex-direction:column;gap:14px;}

.action-zone{border-radius:8px;padding:13px 14px;border:1px solid;}
.az-amber{background:#FFFBEB;border-color:#FCD34D;}
.az-green{background:#F0FDF4;border-color:#86EFAC;}
.az-grey{background:#F4F5F7;border-color:#D9DCE3;}
.action-prompt{font-size:12px;font-weight:700;color:#374151;margin-bottom:6px;}
.action-hint{font-size:11px;color:#6B7280;margin-bottom:10px;}

.btn{display:inline-flex;align-items:center;gap:4px;border:none;font-family:inherit;cursor:pointer;border-radius:7px;font-weight:600;font-size:12px;padding:8px 18px;transition:opacity .12s;}
.btn:hover{opacity:.88;}
.btn-accent{background:var(--accent);color:#fff;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-sm{font-size:10px;font-weight:700;padding:4px 10px;border-radius:5px;border:none;font-family:inherit;cursor:pointer;}
.btn-confirm{background:#059669;color:#fff;}
.btn-reject{background:#fff;color:#DC2626;border:1.5px solid #DC2626 !important;}
.btn-clear{background:#fff;color:#6B7280;border:1px solid #D1D5E0 !important;}
.btn-resubmit{background:#DC2626;color:#fff;white-space:nowrap;}
.btn-ghost{background:none;border:1px solid #D1D5E0;color:#6B7280;font-size:10px;font-weight:600;padding:3px 10px;border-radius:5px;font-family:inherit;cursor:pointer;}
.btn-ghost-green{background:none;border:1px solid #059669;color:#059669;font-size:10px;font-weight:600;padding:3px 10px;border-radius:5px;font-family:inherit;cursor:pointer;}
.btn-link{background:none;border:none;color:#9CA3AF;font-size:11px;cursor:pointer;font-family:inherit;padding:0;}
.btn-link:hover{color:#DC2626;}

.summary-pill{font-size:10px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;}
.badge-overdue{background:#DC2626;color:#fff;animation:pulse 2s infinite;}
.badge-action{background:#DC2626;color:#fff;}
.badge-cancelled{background:#6B7280;color:#fff;}
.hdr-badge{font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;}
.hdr-overdue{background:#DC2626;color:#fff;animation:pulse 2s infinite;cursor:pointer;}
.hdr-notify{background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.3);font-size:11px;font-weight:600;padding:5px 11px;border-radius:20px;cursor:pointer;font-family:inherit;}

.add-form{background:#fff;border:1.5px solid var(--accent);border-radius:10px;padding:16px;margin-bottom:12px;}
.field-label{font-size:10px;color:#6B7280;margin-bottom:4px;font-weight:600;}
input[type=text],input[type=number],input[type=date],select,textarea{
  font-family:inherit;background:#F8F9FC;border:1px solid #D1D5E0;border-radius:6px;color:#1A1D2E;padding:8px 10px;font-size:12px;outline:none;}
input[type=text]:focus,input[type=number]:focus,input[type=date]:focus,select:focus,textarea:focus{border-color:var(--accent);}
input[type=text],input[type=number],input[type=date],select{width:100%;}

.ts{font-size:10px;color:#9CA3AF;}
.ts-green{font-size:10px;color:#059669;}

.banner{font-size:11px;border-radius:8px;padding:9px 13px;margin-bottom:14px;display:flex;gap:8px;align-items:center;}
.banner-local{background:#FFF7ED;border:1px solid #FED7AA;color:#9A3412;}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes slideIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="app"></div>

<!-- Firebase (compat SDK, no build step needed) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
/* ═════════════════════════════════════════════
   FIREBASE CONFIG  —  paste your keys here at Stage 2.
   Leave projectId blank to run in local preview mode.
═════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyCf7tUxGPiv9da3OCCpwGxBgxkeFLGNCn8",
  authDomain: "cms-billing-tracker.firebaseapp.com",
  projectId: "cms-billing-tracker",
  storageBucket: "cms-billing-tracker.firebasestorage.app",
  messagingSenderId: "149259767376",
  appId: "1:149259767376:web:d3f3a9ac8b0a7c9a82cb55"
};
const USE_FIREBASE = !!firebaseConfig.projectId && typeof firebase !== "undefined";
let COL = null;
if (USE_FIREBASE) {
  firebase.initializeApp(firebaseConfig);
  COL = firebase.firestore().collection("batches");
}

/* ═════════════════════════════════════════════
   DATA & CONSTANTS
═════════════════════════════════════════════ */
const HOMES = [
  "AC Scenic Lodge","Arcare Kanwal","Bill Crawford","Boandik Crouch St","Boandik St. Mary's",
  "Bolton Clarke Caboolture","Calvary Coffs Harbour","Churches of Christ Toowoomba",
  "Churches of Christ Warwick","Eureka Village","Geoffrey Cutter","GH Stawell",
  "Hammondcare Caulfield","Hammondcare Horsley","Hardi Vale Manly Vale","Illaroo",
  "IRT Crown Gardens","IRT Culburra","IRT Dalmeny","IRT Greenwell Gardens","IRT SGB",
  "IRT Unanderra","Jack Lonsdale Lodge","Kanadah Mudgee","Murravale",
  "Opal Cameron Park","Opal Coffs Harbour","Opal Denhams","Opal Dubbo","Opal Gawler",
  "Opal Glen Osmond","Opal Kanwal","Opal Katoomba","Opal Killarney Vale",
  "Opal Lakes Entrances","Opal Mudgee","Opal Nambour","Opal Narrandera","Opal Orange",
  "Opal Shoalhaven","Opal Tingira Hills","Opal Wallarah","RBD Tin Can Bay","Regis Tiwi",
  "Resthaven Mt Gambier","Roseneath","RSL Austral","RSL Condobolin",
  "RSL Kandos","RSL Merimbula","Salvos Merewether","Talbot Place","Uniting Osborne",
  "VMCH Torquay","Warrigal Bundanoon","Warrigal Goulburn","WB Messer",
  "Whiddon Mudgee","Wintringham Ron Conn"
];

const REJ_TYPES = [
  { key:"code-error",     label:"Code error" },
  { key:"gp-np-conflict", label:"GP + NP conflict" },
  { key:"nurse-confirm",  label:"Nurse confirmation required" },
  { key:"other",          label:"Other" },
];

const STORAGE_KEY = "cms_billing_tracker_v1";
const NOTIFIED_KEY = "cms_billing_notified_v1";
const ESCALATE_MS = 48*3600000;

/* ═════════════════════════════════════════════
   HELPERS
═════════════════════════════════════════════ */
let _uid = 1000;
function uid(){ return 'b'+Date.now().toString(36)+(++_uid).toString(36)+Math.floor(Math.random()*9999).toString(36); }
function today(){ return new Date().toISOString().split("T")[0]; }
function fmtDate(s){ if(!s) return ""; const p=String(s).slice(0,10).split("-"); if(p.length!==3) return s;
  const mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][parseInt(p[1],10)-1]||p[1];
  return `${parseInt(p[2],10)} ${mo} ${p[0]}`; }
function hoursAgo(ts){
  if(!ts) return null;
  const h=Math.floor((Date.now()-new Date(ts).getTime())/3600000);
  if(h<1) return "just now";
  if(h<24) return h+"h ago";
  return Math.floor(h/24)+"d "+h%24+"h ago";
}
function fmtTs(ts){ if(!ts) return ""; return new Date(ts).toLocaleString("en-AU",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}); }
function fmtDate(ts){ if(!ts) return ""; return new Date(ts).toLocaleDateString("en-AU",{day:"numeric",month:"short",year:"numeric"}); }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function batchCounts(b){
  const items=b.items||[];
  return {
    confirmed: items.filter(i=>i.status==="confirmed"&&!i.cleared).length,
    awaiting:  items.filter(i=>i.status==="awaiting" &&!i.cleared).length,
    rejected:  items.filter(i=>i.status==="rejected" &&!i.cleared).length,
    cleared:   items.filter(i=>i.cleared).length,
    total:     items.length,
  };
}
function batchAgeMs(b){ return b.submittedAt ? Date.now()-new Date(b.submittedAt).getTime() : 0; }
function isResolved(b){ const c=batchCounts(b); return c.rejected===0 && c.awaiting===0; }

/* Which of the 3 tabs does a batch belong to? */
function batchTab(b){
  if(b.outcome==="cancelled") return "confirmed";
  if(b.outcome==="confirmed")  return "confirmed";
  if(b.outcome==="has_rejections") return isResolved(b) ? "confirmed" : "pending";
  // no outcome yet
  return batchAgeMs(b) >= ESCALATE_MS ? "pending" : "awaiting";
}
/* Overdue = submitted, no response, 48h+ elapsed */
function isOverdue(b){ return !b.outcome && b.submittedAt && batchAgeMs(b) >= ESCALATE_MS; }
function confDate(b){ return b.confirmedAt || b.cancelledAt || b.resolvedAt || b.date || b.submittedAt; }
function claimsOf(b){ return b.totalCount || (b.items||[]).length; }
// Claims that count as confirmed/billable, including the confirmed portion of a
// batch that still has some pending items being resolved.
function confirmedClaims(b){
  if(b.outcome==="cancelled") return 0;
  if(b.outcome==="confirmed")  return claimsOf(b);
  if(b.outcome==="has_rejections"){
    const c=batchCounts(b);
    const nonRejected=Math.max(0, claimsOf(b)-(b.items||[]).length);
    return nonRejected + c.confirmed + c.cleared;
  }
  return 0; // still awaiting Medicare — nothing confirmed yet
}

/* ═════════════════════════════════════════════
   DATA LAYER  (Firebase real-time  OR  local preview)
═════════════════════════════════════════════ */
function loadLocal(){
  try{ const r=localStorage.getItem(STORAGE_KEY); if(r) return JSON.parse(r)||[]; }catch(e){}
  return [];
}
function saveLocal(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(S.batches)); }catch(e){} }

function persistBatch(b){
  if(USE_FIREBASE){ COL.doc(b.id).set(b).catch(err=>console.error("save failed",err)); }
  else { saveLocal(); }
}
function deletePersist(id){
  if(USE_FIREBASE){ COL.doc(id).delete().catch(err=>console.error("delete failed",err)); }
  else { saveLocal(); }
}

/* ═════════════════════════════════════════════
   STATE
═════════════════════════════════════════════ */
const S = {
  batches: USE_FIREBASE ? [] : loadLocal(),
  tab: "awaiting",
  showAdd: false,
  openBatch: null,
  newBatch: { home:"", doctor:"", date:today(), count:1 },
  confFrom: "",
  confTo: "",
};

/* ═════════════════════════════════════════════
   MUTATIONS
═════════════════════════════════════════════ */
function updateBatchLocal(id, fn){
  let changed=null;
  S.batches = S.batches.map(b=> b.id===id ? (changed=fn(b)) : b);
  return changed;
}
function commit(id, fn){
  const b = updateBatchLocal(id, fn);
  if(b) persistBatch(b);
  render();
}
function updateItem(bid, iid, fn){
  commit(bid, b => ({ ...b, items:(b.items||[]).map(i=> i.id===iid ? fn(i) : i) }));
}

function doConfirmItem(bid,iid){ updateItem(bid,iid,i=>({...i,status:"confirmed",confirmedAt:new Date().toISOString()})); }
function doRejectItem(bid,iid){ updateItem(bid,iid,i=>({...i,status:"rejected"})); }
function doClearItem(bid,iid){ updateItem(bid,iid,i=>({...i,cleared:true})); }
function doClearAllConfirmed(bid){ commit(bid,b=>({...b,items:(b.items||[]).map(i=>i.status==="confirmed"?{...i,cleared:true}:i)})); }
function doSetRejectionType(bid,iid,rtype){ updateItem(bid,iid,i=>({...i,rejectionType:rtype,chases:i.chases||[]})); }
function doEscalateItem(bid,iid){ updateItem(bid,iid,i=>({...i,escalatedAt:new Date().toISOString()})); }
function doLogChase(bid,iid){
  const f=document.getElementById('chase_desc_'+iid); const desc=f?f.value.trim():"";
  updateItem(bid,iid,i=>({...i,chases:[...(i.chases||[]),{sentAt:new Date().toISOString(),desc}]}));
}
function doSaveInvoice(bid,iid){
  const f=document.getElementById('rej_label_'+iid); const val=f?f.value.trim():"";
  if(!val) return;
  updateItem(bid,iid,i=>({...i,invoiceNum:val}));
}
function doToggleNoInvoice(bid,iid){
  updateItem(bid,iid,i=>({...i,noInvoiceYet:!i.noInvoiceYet,invoiceNum:!i.noInvoiceYet?"No Invoice Yet":i.invoiceNum}));
}
function mkRejectedItem(label){
  return { id:uid(), label, status:"rejected", cleared:false, resolution:"",
    invoiceNum:"", noInvoiceYet:false, rejectionHistory:[], rejectionType:null, rejectionTypeOther:"",
    chases:[], rejectedAt:new Date().toISOString(), submittedAt:null, confirmedAt:null, escalatedAt:null };
}
function doAddRejectedItem(bid){
  commit(bid, b=>{
    const n=(b.items||[]).length+1;
    return { ...b, outcome:"has_rejections", items:[...(b.items||[]), mkRejectedItem("Claim "+String(n).padStart(3,"0"))] };
  });
}
function doResubmitItem(bid,iid){
  const batch=S.batches.find(b=>b.id===bid);
  const item=batch?(batch.items||[]).find(i=>i.id===iid):null;
  if(!item || !item.rejectionType) return;
  let rejTypeLabel=(REJ_TYPES.find(r=>r.key===item.rejectionType)||{label:item.rejectionType}).label;
  if(item.rejectionType==="other"){
    const f=document.getElementById('rej_type_other_'+iid);
    const t=f?f.value.trim():(item.rejectionTypeOther||"").trim();
    if(!t){ if(f){f.style.borderColor="#DC2626";f.focus();} return; }
    rejTypeLabel="Other: "+t;
  }
  const ta=document.getElementById('rej_'+iid);
  const reason=ta?ta.value.trim():"";
  if(!reason){ if(ta){ta.style.borderColor="#DC2626";ta.focus();} return; }
  const lf=document.getElementById('rej_label_'+iid);
  const newInvoice=lf?lf.value.trim():"";
  updateItem(bid,iid,i=>({
    ...i,
    label:newInvoice||i.invoiceNum||i.label,
    invoiceNum:newInvoice||i.invoiceNum,
    status:"awaiting", rejectionType:null, rejectionTypeOther:"", chases:[], escalatedAt:null,
    rejectionHistory:[...(i.rejectionHistory||[]),{rejectedAt:new Date().toISOString(),reason,rejectionType:rejTypeLabel,chases:i.chases||[]}],
    submittedAt:new Date().toISOString(), confirmedAt:null,
  }));
}
function doCheckBatch(bid){ commit(bid,b=>({...b,checks:[...(b.checks||[]),new Date().toISOString()]})); }
function doConfirmAll(bid){ commit(bid,b=>({...b,outcome:"confirmed",confirmedAt:new Date().toISOString()})); }
function doCancelBatch(bid){ commit(bid,b=>({...b,outcome:"cancelled",cancelledAt:new Date().toISOString()})); }
function doReactivateBatch(bid){ commit(bid,b=>({...b,outcome:null,cancelledAt:null})); }
function doDeleteBatch(bid){
  S.batches=S.batches.filter(b=>b.id!==bid);
  if(S.openBatch===bid) S.openBatch=null;
  deletePersist(bid);
  render();
}
function doAddBatch(){
  const {home,doctor,date,count}=S.newBatch;
  if(!home||!count||count<1) return;
  const now=new Date().toISOString();
  const b={ id:uid(), home, doctor:doctor||"", date, doctorLabel:doctor||"",
    notes:"", submittedAt:now, createdAt:now, totalCount:parseInt(count), outcome:null,
    confirmedAt:null, cancelledAt:null, checks:[], items:[] };
  S.batches.push(b);
  persistBatch(b);
  S.newBatch={home:"",doctor:"",date:today(),count:1};
  S.showAdd=false;
  render();
}

/* ═════════════════════════════════════════════
   RENDER — batch action zone
═════════════════════════════════════════════ */
function renderBatchAction(batch){
  const bid=batch.id;
  const total=claimsOf(batch);
  if(batch.outcome==="cancelled"){
    return `<div class="action-zone az-grey">
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:20px;color:#6B7280;">&#8856;</span>
        <div>
          <div style="font-weight:700;font-size:12px;color:#4B5563;">Home cancelled — no claims processed</div>
          <div style="font-size:11px;color:#6B7280;margin-top:2px;">Marked cancelled ${hoursAgo(batch.cancelledAt)}</div>
        </div>
      </div>
    </div>`;
  }
  if(batch.outcome==="confirmed") return `
    <div class="action-zone az-green">
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:22px;color:#059669;">&#10003;</span>
        <div>
          <div style="font-weight:700;font-size:12px;color:#059669;">All ${total} claims confirmed by Medicare</div>
          <div style="font-size:11px;color:#6B7280;margin-top:2px;">Confirmed ${hoursAgo(batch.confirmedAt)} — batch complete</div>
        </div>
      </div>
    </div>`;
  if(batch.outcome==="has_rejections"){
    const c=batchCounts(batch);
    const activeRej=c.rejected, resubmitted=c.awaiting, resolved=c.confirmed+c.cleared;
    const nonRejected=total-(batch.items||[]).length;
    if(activeRej===0 && resubmitted===0) return `
      <div class="action-zone az-green">
        <div style="font-weight:700;font-size:12px;color:#059669;margin-bottom:4px;">&#10003; All rejections resolved</div>
        <div style="font-size:11px;color:#6B7280;">${nonRejected} claims confirmed &middot; ${resolved} rejection${resolved!==1?"s":""} resolved</div>
      </div>`;
    return `
      <div class="action-zone az-amber">
        <div class="action-prompt" style="margin-bottom:5px;">Tracking pending items for this batch</div>
        <div style="font-size:11px;color:#6B7280;margin-bottom:10px;">
          ${nonRejected>0?'<span style="color:#059669;font-weight:600;">'+nonRejected+' confirmed</span> &nbsp;&middot;&nbsp;':""
          }${activeRej>0?'<span style="color:#DC2626;font-weight:600;">'+activeRej+' pending resolution</span>':""
          }${resubmitted>0?' &nbsp;&middot;&nbsp;<span style="color:#D97706;font-weight:600;"> '+resubmitted+' resubmitted — awaiting</span>':""
          }${resolved>0?' &nbsp;&middot;&nbsp; '+resolved+' resolved':""}
        </div>
        <button class="btn-ghost" data-action="add-rejected-item" data-bid="${esc(bid)}">+ Log another pending item</button>
      </div>`;
  }
  // No outcome yet
  return `
    <div class="action-zone az-amber">
      <div class="action-prompt">Medicare responded to this batch?</div>
      <div class="action-hint" style="margin-bottom:10px;">${total} claim${total!==1?"s":""} submitted — log the Medicare outcome below.</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-confirm" style="font-size:12px;padding:8px 18px;" data-action="confirm-all" data-bid="${esc(bid)}">&#10003; All confirmed</button>
        <button class="btn" style="background:#DC2626;color:#fff;font-size:12px;padding:8px 18px;border-radius:7px;border:none;font-family:inherit;cursor:pointer;font-weight:600;" data-action="add-rejected-item" data-bid="${esc(bid)}">&#10007; Log Pending Invoice</button>
        <button class="btn" style="background:#6B7280;color:#fff;font-size:12px;padding:8px 18px;border-radius:7px;border:none;font-family:inherit;cursor:pointer;font-weight:600;" data-action="cancel-batch" data-bid="${esc(bid)}">&#8856; Home cancelled</button>
      </div>
      <div style="font-size:11px;color:#9CA3AF;margin-top:8px;">If the visit didn't go ahead, mark the home cancelled.</div>
    </div>`;
}

function renderItem(batch,item){
  const bid=batch.id, iid=item.id;
  const active = batch.outcome!=="cancelled";
  let bg,border;
  if(item.cleared){ bg="#F8F8FA"; border="#E2E5F0"; }
  else if(item.status==="confirmed"){ bg="#F0FDF4"; border="#BBF7D0"; }
  else if(item.status==="rejected"){ bg="#FFF8F8"; border="#FCA5A5"; }
  else { bg="#FFFBEB"; border="#FDE68A"; }

  const pillMap={awaiting:["#D97706","#FFFBEB","Awaiting"],confirmed:["#059669","#ECFDF5","Confirmed &#10003;"],rejected:["#DC2626","#FEF2F2","Rejected"]};
  const [pClr,pBg,pLbl]=pillMap[item.status]||["#6B7280","#F3F4F6","&ndash;"];
  const rh=(item.rejectionHistory||[]).length;
  const rhBadge=rh>0?'<span style="font-size:9px;background:#FEE2E2;color:#DC2626;padding:1px 5px;border-radius:4px;font-weight:600;margin-left:4px;">'+rh+'&times;&#10007;</span>':"";

  const statusCol=`<div><span style="background:${pBg};color:${pClr};font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;">${pLbl}</span>${item.confirmedAt?'<span style="font-size:10px;color:#9CA3AF;margin-left:6px;">'+hoursAgo(item.confirmedAt)+'</span>':""}</div>`;

  let actions="";
  if(item.cleared){ actions='<span style="font-size:10px;color:#9CA3AF;font-style:italic;">cleared</span>'; }
  else if(!active){ actions='<span style="font-size:10px;color:#C4C9D4;">&mdash;</span>'; }
  else if(item.status==="awaiting"){
    actions=`<button class="btn-sm btn-confirm" data-action="confirm-item" data-bid="${esc(bid)}" data-iid="${esc(iid)}">&#10003; Confirmed</button>
             <button class="btn-sm btn-reject" data-action="reject-item" data-bid="${esc(bid)}" data-iid="${esc(iid)}">&#10007; Rejected</button>`;
  } else if(item.status==="confirmed"){
    actions=`<button class="btn-sm btn-clear" data-action="clear-item" data-bid="${esc(bid)}" data-iid="${esc(iid)}">Clear</button>`;
  } else if(item.status==="rejected"){
    actions='<span style="font-size:10px;color:#DC2626;font-style:italic;">action required &#8595;</span>';
  }

  const showRejForm = item.status==="rejected" && active && !item.cleared;
  let rejForm="";
  if(showRejForm){
    const chases=item.chases||[];
    const isEsc = chases.length>0 && (Date.now()-new Date(chases[0].sentAt).getTime())>7*24*3600000;
    const rejTypePills=REJ_TYPES.map(rt=>{
      const sel=item.rejectionType===rt.key;
      return `<button style="font-size:10px;font-weight:700;padding:4px 10px;border-radius:5px;font-family:inherit;cursor:pointer;${sel?"background:#DC2626;color:#fff;border:1.5px solid #DC2626;":"background:#fff;color:#DC2626;border:1.5px solid #FCA5A5;"}" data-action="set-rejection-type" data-bid="${esc(bid)}" data-iid="${esc(iid)}" data-rtype="${esc(rt.key)}">${esc(rt.label)}</button>`;
    }).join("");
    const otherField = item.rejectionType==="other" ? `
      <input type="text" id="rej_type_other_${esc(iid)}" value="${esc(item.rejectionTypeOther||"")}" data-bid="${esc(bid)}" data-iid="${esc(iid)}" placeholder="Describe rejection reason..." style="margin-top:6px;width:100%;font-size:11px;border:1.5px solid #FCA5A5;border-radius:6px;background:#fff;padding:6px 10px;color:#1A1D2E;">` : "";

    let chaseSection="";
    if(item.rejectionType){
      const chaseRows=chases.map((ch,idx)=>`<div style="font-size:10px;color:#92400E;padding:4px 0;border-bottom:1px solid #FDE68A;"><span style="font-weight:700;">Chase ${idx+1}</span> &mdash; <span style="color:#6B7280;">${fmtTs(ch.sentAt)}</span>${ch.desc?'<span style="color:#92400E;font-style:italic;"> &mdash; '+esc(ch.desc)+'</span>':""}</div>`).join("");
      let chaseBtn="";
      if(chases.length<3){
        chaseBtn=`<div style="margin-top:6px;">
          <input type="text" id="chase_desc_${esc(iid)}" placeholder="e.g. Email sent, Nurse following up…" style="width:100%;font-size:11px;border:1px solid #FCD34D;border-radius:5px;background:#fff;padding:5px 8px;color:#1A1D2E;margin-bottom:5px;">
          <button style="font-size:10px;font-weight:700;padding:4px 10px;border-radius:5px;font-family:inherit;cursor:pointer;background:#D97706;color:#fff;border:none;" data-action="log-chase" data-bid="${esc(bid)}" data-iid="${esc(iid)}">+ Log Chase ${chases.length+1}</button>
        </div>`;
      } else if(item.escalatedAt){
        chaseBtn=`<div style="margin-top:6px;background:#FEE2E2;border:1px solid #FCA5A5;border-radius:5px;padding:6px 10px;display:flex;align-items:center;gap:6px;">
          <span style="font-size:13px;">&#9650;</span>
          <div><div style="font-size:10px;font-weight:700;color:#DC2626;">Escalated to supervisor</div><div style="font-size:9px;color:#92400E;margin-top:1px;">${fmtTs(item.escalatedAt)}</div></div>
        </div>`;
      } else {
        chaseBtn=`<button style="font-size:10px;font-weight:700;padding:6px 12px;border-radius:5px;font-family:inherit;cursor:pointer;background:#DC2626;color:#fff;border:none;margin-top:6px;display:flex;align-items:center;gap:5px;" data-action="escalate-item" data-bid="${esc(bid)}" data-iid="${esc(iid)}">&#9650; Escalate to Supervisor</button>`;
      }
      chaseSection=`<div style="background:#FFFBEB;border:1px solid #FCD34D;border-radius:6px;padding:8px 10px;margin-top:8px;margin-bottom:2px;">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;">
          <span style="font-size:10px;color:#92400E;font-weight:700;">NURSE / CASE CONFIRMATION CHASE</span>
          ${chases.length>0?'<span style="font-size:9px;color:#92400E;font-weight:500;">'+chases.length+' sent</span>':""}
          ${isEsc?'<span style="font-size:9px;background:#DC2626;color:#fff;padding:2px 6px;border-radius:4px;font-weight:700;animation:pulse 2s infinite;">ESCALATE</span>':""}
        </div>
        ${chases.length===0?'<div style="font-size:10px;color:#9CA3AF;font-style:italic;">No chases logged yet</div>':''}
        ${chaseRows}${chaseBtn}
      </div>`;
    }
    const prevHist=(item.rejectionHistory||[]).length>0
      ? '<div style="margin-top:6px;font-size:10px;color:#9CA3AF;border-top:1px solid #FCA5A5;padding-top:6px;">Previous: '+item.rejectionHistory.map((h,i)=>'#'+(i+1)+(h.rejectionType?' ['+esc(h.rejectionType)+']':'')+' &mdash; '+esc(h.reason.substring(0,50))+(h.reason.length>50?"&hellip;":"")).join(" &middot; ")+'</div>' : "";
    const typeSelected=!!item.rejectionType;
    const resubmitStyle=typeSelected?'':'opacity:0.4;cursor:not-allowed;pointer-events:none;';

    rejForm=`<div style="padding:12px;background:#FFF0F0;border:1px solid #FCA5A5;border-top:none;border-radius:0 0 7px 7px;margin-top:-4px;">
      <div style="font-size:10px;color:#D97706;font-weight:700;background:#FFFBEB;padding:5px 8px;border-radius:5px;margin-bottom:10px;">&#9888; Pending resolution &mdash; log details below. Resubmit once resolved.</div>
      <div style="margin-bottom:10px;">
        <div style="font-size:10px;color:#92400E;font-weight:700;margin-bottom:5px;">INVOICE NUMBER (from ZedMed):</div>
        ${item.noInvoiceYet
          ? `<div style="display:flex;align-items:center;gap:8px;"><span style="font-size:11px;font-style:italic;color:#D97706;font-weight:600;">No Invoice Yet</span><button style="font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px;font-family:inherit;cursor:pointer;background:#fff;color:#6B7280;border:1px solid #D1D5E0;" data-action="toggle-no-invoice" data-bid="${esc(bid)}" data-iid="${esc(iid)}">Change</button></div>`
          : `<div style="display:flex;gap:6px;align-items:center;"><input type="text" id="rej_label_${esc(iid)}" value="${esc(item.invoiceNum||"")}" placeholder="INV#" style="flex:1;font-size:12px;font-weight:600;border:1.5px solid #FCA5A5;border-radius:6px;background:#fff;padding:7px 10px;color:#1A1D2E;"><button style="font-size:10px;font-weight:700;padding:7px 12px;border-radius:6px;font-family:inherit;cursor:pointer;background:#D4621A;color:#fff;border:none;white-space:nowrap;" data-action="save-invoice" data-bid="${esc(bid)}" data-iid="${esc(iid)}">Save</button><button style="font-size:9px;font-weight:600;padding:4px 8px;border-radius:5px;font-family:inherit;cursor:pointer;background:#fff;color:#D97706;border:1px solid #FCD34D;white-space:nowrap;" data-action="toggle-no-invoice" data-bid="${esc(bid)}" data-iid="${esc(iid)}">No Invoice Yet</button></div>`}
        ${item.invoiceNum&&!item.noInvoiceYet?`<div style="font-size:10px;color:#059669;margin-top:3px;font-weight:600;">&#10003; Saved: ${esc(item.invoiceNum)}</div>`:""}
      </div>
      <div style="margin-bottom:8px;">
        <div style="font-size:10px;color:#92400E;font-weight:700;margin-bottom:5px;">STEP 1 &mdash; Rejection type:</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;">${rejTypePills}</div>${otherField}
      </div>
      ${chaseSection}
      <div style="margin-top:10px;">
        <div style="font-size:10px;color:#92400E;font-weight:700;margin-bottom:5px;">STEP 2 &mdash; Resolution note (required to resubmit):</div>
        <div style="display:flex;gap:8px;align-items:flex-start;">
          <textarea id="rej_${esc(iid)}" rows="2" placeholder="e.g. Incorrect provider number &mdash; correcting and resubmitting&hellip;" style="flex:1;font-size:11px;background:#fff;border:1.5px solid #FCA5A5;border-radius:6px;color:#1A1D2E;padding:7px 10px;resize:none;line-height:1.4;"></textarea>
          <button class="btn-sm btn-resubmit" data-action="resubmit-item" data-bid="${esc(bid)}" data-iid="${esc(iid)}" style="${resubmitStyle}">Log &amp; Resubmit &rarr;</button>
        </div>${prevHist}
      </div>
    </div>`;
  }

  const alignItems = (item.status==="awaiting" && active && !item.cleared) ? "flex-start" : "center";
  return `<div style="margin-bottom:${showRejForm?8:4}px;">
    <div style="display:grid;grid-template-columns:140px 1fr auto;gap:10px;align-items:${alignItems};padding:9px 12px;border-radius:${showRejForm?"7px 7px 0 0":"7px"};border:1px solid ${border};background:${bg};${item.cleared?"opacity:0.5;":""}">
      <div style="display:flex;align-items:center;"><span style="font-size:12px;font-weight:600;color:#374151;">${esc(item.label)}</span>${rhBadge}</div>
      ${statusCol}
      <div style="display:flex;flex-direction:column;align-items:flex-end;"><div style="display:flex;gap:6px;align-items:center;">${actions}</div></div>
    </div>${rejForm}
  </div>`;
}

function renderSummaryPill(batch){
  if(batch.outcome==="cancelled") return `<div class="summary-pill" style="background:#EEF0F3;color:#6B7280;">Cancelled</div>`;
  if(batch.outcome==="confirmed") return `<div class="summary-pill" style="background:#ECFDF5;color:#059669;">All ${claimsOf(batch)} confirmed &#10003;</div>`;
  if(batch.outcome==="has_rejections"){
    const c=batchCounts(batch); const parts=[];
    if(c.rejected>0)parts.push('<span style="color:#DC2626;font-weight:700;">'+c.rejected+'&#10007;</span>');
    if(c.awaiting>0) parts.push('<span style="color:#D97706;font-weight:700;">'+c.awaiting+'&#9203;</span>');
    if(c.confirmed>0)parts.push('<span style="color:#059669;font-weight:700;">'+c.confirmed+'&#10003;</span>');
    if(isResolved(batch)) return `<div class="summary-pill" style="background:#ECFDF5;color:#059669;">Resolved &#10003;</div>`;
    return `<div class="summary-pill" style="background:#FEF2F2;">${parts.join(" ")}</div>`;
  }
  const total=claimsOf(batch);
  return `<div class="summary-pill" style="background:#FFFBEB;color:#D97706;">Awaiting &mdash; ${total} claim${total!==1?"s":""}</div>`;
}

function renderBatch(batch){
  const over=isOverdue(batch);
  const rej=batch.outcome==="has_rejections"&&!isResolved(batch);
  const cancelled=batch.outcome==="cancelled";
  const confirmed=batch.outcome==="confirmed"||(batch.outcome==="has_rejections"&&isResolved(batch));
  const open=S.openBatch===batch.id;
  const c=batchCounts(batch);
  const borderClr=cancelled?"#D9DCE3":over||rej?"#DC2626":confirmed?"#86EFAC":"#E2E5F0";
  const total=claimsOf(batch);
  const checks=batch.checks||[];
  const lastCheck=checks.length>0?checks[checks.length-1]:null;

  const subBits=[total+" claims"];
  if(batch.date) subBits.push("Consultation "+fmtDate(batch.date));
  if(batch.doctor) subBits.push("Dr "+esc(batch.doctor));
  subBits.push("submitted "+hoursAgo(batch.submittedAt));
  if(lastCheck) subBits.push("checked "+hoursAgo(lastCheck));
  const sub=subBits.filter(Boolean).join(" &middot; ");

  const showItems=batch.outcome==="has_rejections"&&(batch.items||[]).length>0;
  const confirmedItems=(batch.items||[]).filter(i=>i.status==="confirmed"&&!i.cleared);
  const showClearAll=showItems&&confirmedItems.length>=2;

  let body="";
  if(open){
    body=`<div class="batch-body">
      ${renderBatchAction(batch)}
      ${showItems?`<div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <div style="font-size:10px;font-weight:700;color:#6B7280;letter-spacing:0.4px;">PENDING ITEMS (${batch.items.length}${c.cleared>0?" &middot; "+c.cleared+" resolved":""})</div>
          <div style="display:flex;gap:8px;">${showClearAll?`<button class="btn-ghost-green" data-action="clear-all" data-bid="${esc(batch.id)}">Clear resolved (${confirmedItems.length})</button>`:""}</div>
        </div>
        <div>${batch.items.map(item=>renderItem(batch,item)).join("")}</div>
      </div>`:""}
      <div style="border-top:1px solid #F0F2F8;padding-top:10px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px;">
          <div style="display:flex;gap:14px;flex-wrap:wrap;">
            ${batch.createdAt?'<span class="ts">Created: '+fmtTs(batch.createdAt)+'</span>':""}
            ${batch.submittedAt?'<span class="ts">Submitted: '+fmtTs(batch.submittedAt)+'</span>':""}
            ${batch.confirmedAt?'<span class="ts-green">Confirmed: '+fmtTs(batch.confirmedAt)+'</span>':""}
            ${batch.cancelledAt?'<span class="ts">Cancelled: '+fmtTs(batch.cancelledAt)+'</span>':""}
          </div>
          <div style="display:flex;gap:12px;align-items:center;">
            ${cancelled
              ? `<button class="btn-link" style="color:#059669;" data-action="reactivate-batch" data-bid="${esc(batch.id)}">Reactivate</button>`
              : (!confirmed ? `<button class="btn-link" style="color:#6B7280;" data-action="cancel-batch" data-bid="${esc(batch.id)}">Mark home cancelled</button>` : "")}
            <button class="btn-link" data-action="delete-batch" data-bid="${esc(batch.id)}">Delete</button>
          </div>
        </div>
        ${(!confirmed&&!cancelled)?`<div style="display:flex;align-items:center;gap:12px;background:#F8F9FC;border:1px solid #E2E5F0;border-radius:7px;padding:8px 12px;">
          <button class="btn-ghost" style="font-size:11px;padding:5px 14px;white-space:nowrap;" data-action="check-batch" data-bid="${esc(batch.id)}">&#10003; Mark as Checked</button>
          <div style="flex:1;min-width:0;">
            ${lastCheck?`<div style="font-size:10px;color:#374151;font-weight:600;">Last checked: ${fmtTs(lastCheck)}</div>`:`<div style="font-size:10px;color:#D97706;font-weight:600;">Not yet checked today</div>`}
            ${checks.length>1?`<div style="font-size:9px;color:#9CA3AF;margin-top:2px;">${checks.slice(-4,-1).reverse().map(c=>'&bull; '+fmtTs(c)).join(' &nbsp;')}</div>`:""}
          </div>
        </div>`:""}
      </div>
    </div>`;
  }

  return `<div class="card" style="border-color:${borderClr};${cancelled?'opacity:0.78;':''}">
    <div class="batch-header" data-action="toggle-batch" data-bid="${esc(batch.id)}">
      <div>
        <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;">
          <span style="font-size:13px;font-weight:600;">${esc(batch.home)}</span>
          ${over?'<span class="badge badge-overdue">OVERDUE</span>':""}
          ${rej&&!over?'<span class="badge badge-action">ACTION NEEDED</span>':""}
          ${confirmed?'<span style="font-size:9px;background:#ECFDF5;color:#059669;padding:2px 7px;border-radius:4px;font-weight:700;">DONE</span>':""}
          ${cancelled?'<span class="badge badge-cancelled">CANCELLED</span>':""}
        </div>
        <div class="ts" style="margin-top:3px;">${sub}</div>
      </div>
      ${renderSummaryPill(batch)}
      <div style="color:#9CA3AF;font-size:11px;">${open?"&#9650;":"&#9660;"}</div>
    </div>${body}
  </div>`;
}

/* ═════════════════════════════════════════════
   RENDER — tab bodies
═════════════════════════════════════════════ */
function sortByNewest(list){ return list.slice().sort((a,b)=>new Date(b.submittedAt||b.date)-new Date(a.submittedAt||a.date)); }

function tabBatches(tab){ return S.batches.filter(b=>batchTab(b)===tab); }

function renderAwaiting(){
  const list=sortByNewest(tabBatches("awaiting"));
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
      <div style="font-size:12px;color:#6B7280;">New batches submitted to Medicare, waiting on a response. Anything still waiting after 48 hours moves to <strong>Pending Resolution</strong> automatically.</div>
      <button class="btn btn-primary" data-action="toggle-add">+ Add Batch</button>
    </div>
    ${S.showAdd?renderAddForm():""}
    <div>${list.length===0?emptyState("Nothing awaiting a response right now.","Click + Add Batch to log a new submission."):list.map(renderBatch).join("")}</div>`;
}

function renderPending(){
  const list=sortByNewest(tabBatches("pending"));
  const overdueN=list.filter(isOverdue).length;
  const rejN=list.filter(b=>b.outcome==="has_rejections").length;
  return `
    <div style="font-size:12px;color:#6B7280;margin-bottom:12px;">
      Your follow-up queue. Batches here either got <strong>no response within 48 hours</strong> (${overdueN}) or have <strong>rejected claims</strong> to work through (${rejN}).
    </div>
    <div>${list.length===0?emptyState("Nothing to chase. Nice.","Overdue batches and rejections land here for follow-up."):list.map(renderBatch).join("")}</div>`;
}

function renderConfirmed(){
  const all=tabBatches("confirmed");
  const from=S.confFrom, to=S.confTo;
  const inRange=b=>{
    const d=(b.date||confDate(b)||"").split("T")[0]; // filter by consultation date, not entry/confirm date
    if(from && d<from) return false;
    if(to && d>to) return false;
    return true;
  };
  const filtered=all.filter(inRange);
  const live=filtered.filter(b=>b.outcome!=="cancelled");
  const cancelled=filtered.filter(b=>b.outcome==="cancelled");
  const fullClaims=live.reduce((s,b)=>s+claimsOf(b),0);
  // Confirmed claims that live inside batches still being resolved (Pending Resolution).
  const partialBatches=S.batches.filter(b=>batchTab(b)==="pending"&&b.outcome==="has_rejections"&&inRange(b));
  const partialClaims=partialBatches.reduce((s,b)=>s+confirmedClaims(b),0);
  const totalClaims=fullClaims+partialClaims;
  // Show fully-confirmed/cancelled batches AND partially-confirmed ones (still in Pending Resolution),
  // ordered by consultation date so the meaningful date leads.
  const svcKey=b=>(b.date||confDate(b)||"");
  const combined=filtered.map(b=>({b,partial:false}))
    .concat(partialBatches.map(b=>({b,partial:true})))
    .sort((x,y)=>svcKey(y.b).localeCompare(svcKey(x.b)));

  return `
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;">
      <div class="card" style="flex:1;min-width:160px;margin:0;padding:14px 16px;">
        <div style="font-size:26px;font-weight:800;color:#059669;">${totalClaims}</div>
        <div style="font-size:11px;color:#6B7280;margin-top:2px;">Claims confirmed${(from||to)?" in range":" (all time)"}</div>
        ${partialClaims>0?'<div style="font-size:10px;color:#9CA3AF;margin-top:3px;">includes '+partialClaims+' from '+partialBatches.length+' batch'+(partialBatches.length!==1?'es':'')+' still in Pending Resolution</div>':""}
      </div>
      <div class="card" style="flex:1;min-width:160px;margin:0;padding:14px 16px;">
        <div style="font-size:26px;font-weight:800;color:#374151;">${live.length}</div>
        <div style="font-size:11px;color:#6B7280;margin-top:2px;">Batches confirmed</div>
      </div>
      <div class="card" style="flex:1;min-width:160px;margin:0;padding:14px 16px;">
        <div style="font-size:26px;font-weight:800;color:#6B7280;">${cancelled.length}</div>
        <div style="font-size:11px;color:#6B7280;margin-top:2px;">Homes cancelled</div>
      </div>
    </div>
    <div style="display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;background:#fff;border:1px solid #E2E5F0;border-radius:10px;padding:12px 14px;margin-bottom:14px;">
      <div><div class="field-label">FROM</div><input type="date" id="conf-from" value="${esc(from)}" data-action="conf-range" style="width:150px;"></div>
      <div><div class="field-label">TO</div><input type="date" id="conf-to" value="${esc(to)}" data-action="conf-range" style="width:150px;"></div>
      ${(from||to)?`<button class="btn-ghost" style="padding:7px 12px;" data-action="conf-clear">Clear filter</button>`:""}
      <div style="font-size:11px;color:#9CA3AF;margin-left:auto;align-self:center;">Counts total <strong>claims</strong>, not homes.</div>
    </div>
    <div>${combined.length===0?emptyState("No confirmed batches in this range.","Confirmed and cancelled batches appear here."):combined.map(o=>o.partial?renderPartialCard(o.b):renderBatch(o.b)).join("")}</div>`;
}

// Compact read-only card shown in Batch Confirmed for a batch that is partly confirmed
// but still has pending items being worked in Pending Resolution.
function renderPartialCard(b){
  const conf=confirmedClaims(b), pend=Math.max(0,claimsOf(b)-conf);
  return `<div class="card" style="margin:0 0 10px;padding:14px 16px;border-left:4px solid #D97706;">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
      <div>
        <div style="font-weight:700;font-size:14px;">${esc(b.home)}
          <span style="background:#FFFBEB;color:#B45309;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;margin-left:6px;">PARTIALLY CONFIRMED</span>
        </div>
        <div style="font-size:11px;color:#6B7280;margin-top:4px;">
          ${b.date?"Consultation "+fmtDate(b.date)+" &middot; ":""}${b.doctor?"Dr "+esc(b.doctor)+" &middot; ":""}<span style="color:#059669;font-weight:700;">${conf} confirmed</span> &middot; <span style="color:#D97706;font-weight:700;">${pend} pending</span>
        </div>
      </div>
      <button class="btn-ghost" data-action="goto-pending">Resolve in Pending &rarr;</button>
    </div>
  </div>`;
}

function renderAddForm(){
  return `<div class="add-form">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div style="font-size:11px;font-weight:700;color:var(--accent);">NEW BATCH</div>
      <button class="btn-link" style="color:#6B7280;" data-action="cancel-add">&#10005; Cancel</button>
    </div>
    <div style="display:grid;grid-template-columns:1.4fr 1fr 130px 110px auto;gap:10px;align-items:end;">
      <div>
        <div class="field-label">HOME / LOCATION</div>
        <div class="home-wrap">
          <input type="text" id="nb-home" autocomplete="off" placeholder="Type to search…" value="${esc(S.newBatch.home||"")}" style="width:100%;padding:7px 10px;border:1px solid #D1D5E0;border-radius:6px;font-size:13px;font-family:inherit;">
          <div class="home-dropdown" id="home-dropdown">${HOMES.map(h=>`<div class="home-opt" data-action="pick-home" data-val="${esc(h)}">${esc(h)}</div>`).join("")}</div>
        </div>
      </div>
      <div><div class="field-label">DOCTOR</div><input type="text" id="nb-doctor" placeholder="Doctor name" value="${esc(S.newBatch.doctor||"")}"></div>
      <div><div class="field-label">CONSULTATION DATE</div><input type="date" id="nb-date" value="${esc(S.newBatch.date)}"></div>
      <div><div class="field-label">NO. OF CLAIMS</div><input type="number" id="nb-count" min="1" max="500" placeholder="e.g. 10" value="${S.newBatch.count||""}"></div>
      <button class="btn btn-accent" data-action="add-batch">Add</button>
    </div>
    <div style="font-size:11px;color:#9CA3AF;margin-top:8px;">Log a batch once it has been cross-checked and submitted to Medicare. You only track individual claims if any are rejected.</div>
  </div>`;
}

function emptyState(title,sub){
  return `<div style="text-align:center;color:#9CA3AF;padding:44px 20px;">
    <div style="font-size:13px;font-weight:600;color:#6B7280;">${esc(title)}</div>
    <div style="font-size:11px;margin-top:6px;">${esc(sub)}</div>
  </div>`;
}

/* ═════════════════════════════════════════════
   RENDER — shell
═════════════════════════════════════════════ */
function render(){
  const todayStr=new Date().toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long"});
  const overdueCount=S.batches.filter(isOverdue).length;
  const counts={ awaiting:tabBatches("awaiting").length, pending:tabBatches("pending").length, confirmed:tabBatches("confirmed").length };
  const tabs=[["awaiting","Awaiting Response",counts.awaiting,false],["pending","Pending Resolution",counts.pending,overdueCount>0],["confirmed","Batch Confirmed",counts.confirmed,false]];

  const notifyBtn = ("Notification" in window && Notification.permission!=="granted")
    ? `<button class="hdr-notify" data-action="enable-notify">&#128276; Enable alerts</button>` : "";

  const localBanner = USE_FIREBASE ? "" :
    `<div class="banner banner-local">&#9888; <strong>Preview mode</strong> — data is saved only on this device. Add your Firebase keys (Stage 2) to share live data between Rose and Sheilou.</div>`;

  document.getElementById("app").innerHTML=`
    <div class="header">
      <div class="brand">
        <img src="./logo.png" alt="DataAlike" class="brand-logo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="brand-fallback" style="display:none;">DA</div>
        <div>
          <div class="brand-name">CMS Billing Tracker</div>
          <div class="brand-sub">by <span class="da" style="color:#EF892A;font-weight:700;">DataAlike</span> &middot; ${esc(todayStr)}</div>
        </div>
      </div>
      <div class="hdr-right">
        ${notifyBtn}
        ${overdueCount>0?'<span class="hdr-badge hdr-overdue" data-action="goto-pending">'+overdueCount+' OVERDUE</span>':""}
      </div>
    </div>
    <div class="tabs">
      ${tabs.map(([k,l,n,alert])=>`<button class="tab-btn ${S.tab===k?"active":""}" data-action="set-tab" data-tab="${k}">${esc(l)}<span class="tab-count ${alert?"alert":""}">${n}</span></button>`).join("")}
    </div>
    <div class="content">
      ${localBanner}
      ${S.tab==="awaiting"?renderAwaiting():S.tab==="pending"?renderPending():renderConfirmed()}
    </div>
    <div class="footer">CMS Billing Tracker &middot; built by <span class="da">DataAlike</span> &middot; internal tool</div>`;
}

/* ═════════════════════════════════════════════
   BROWSER NOTIFICATIONS — overdue batches
═════════════════════════════════════════════ */
function loadNotified(){ try{ return JSON.parse(localStorage.getItem(NOTIFIED_KEY))||[]; }catch(e){ return []; } }
function saveNotified(a){ try{ localStorage.setItem(NOTIFIED_KEY, JSON.stringify(a)); }catch(e){} }
function notifyOverdue(){
  if(!("Notification" in window) || Notification.permission!=="granted") return;
  const notified=loadNotified();
  const nowOverdue=S.batches.filter(isOverdue);
  const fresh=nowOverdue.filter(b=>!notified.includes(b.id));
  if(fresh.length){
    const names=fresh.map(b=>b.home).slice(0,3).join(", ");
    try{
      new Notification("Billing Tracker — "+fresh.length+" batch"+(fresh.length>1?"es":"")+" overdue", {
        body: names+(fresh.length>3?" and more":"")+" had no Medicare response in 48h.",
        icon: "./icon.png", tag: "cms-overdue"
      });
    }catch(e){}
  }
  saveNotified(nowOverdue.map(b=>b.id));
}
function enableNotify(){
  if(!("Notification" in window)){ alert("This browser does not support notifications."); return; }
  Notification.requestPermission().then(()=>{ render(); notifyOverdue(); });
}

/* ═════════════════════════════════════════════
   HOME TYPEAHEAD + live "Other" reason capture
═════════════════════════════════════════════ */
function filterHomes(q){
  const dd=document.getElementById("home-dropdown"); if(!dd) return;
  const v=q.trim().toLowerCase(); let any=false;
  dd.querySelectorAll(".home-opt").forEach(o=>{
    const m=!v||o.dataset.val.toLowerCase().includes(v);
    o.style.display=m?"":"none"; if(m) any=true;
  });
  dd.classList.toggle("open",any);
}
document.addEventListener("input",function(e){
  if(e.target.id==="nb-home") filterHomes(e.target.value);
  if(e.target.id==="nb-doctor") S.newBatch.doctor=e.target.value;
  if(e.target.id && e.target.id.startsWith("rej_type_other_")){
    const {bid,iid}=e.target.dataset;
    const batch=S.batches.find(b=>b.id===bid);
    if(batch){ const it=(batch.items||[]).find(i=>i.id===iid); if(it){ it.rejectionTypeOther=e.target.value; persistBatch(batch); } }
  }
});

/* ═════════════════════════════════════════════
   EVENT DELEGATION
═════════════════════════════════════════════ */
document.addEventListener("change",function(e){
  if(e.target.id==="conf-from"){ S.confFrom=e.target.value; render(); }
  if(e.target.id==="conf-to"){ S.confTo=e.target.value; render(); }
});
document.addEventListener("click",function(e){
  if(!e.target.closest(".home-wrap")){ const dd=document.getElementById("home-dropdown"); if(dd) dd.classList.remove("open"); }
  const el=e.target.closest("[data-action]"); if(!el) return;
  const {action,bid,iid,tab}=el.dataset;
  if(action==="conf-range") return; // handled by change
  e.stopPropagation();

  if(action==="add-batch"){
    const h=document.getElementById("nb-home"), dc=document.getElementById("nb-doctor"), d=document.getElementById("nb-date"), c=document.getElementById("nb-count");
    if(h) S.newBatch.home=h.value;
    if(dc) S.newBatch.doctor=dc.value;
    if(d) S.newBatch.date=d.value;
    if(c) S.newBatch.count=parseInt(c.value)||1;
  }

  switch(action){
    case "set-tab": S.tab=tab; S.openBatch=null; render(); break;
    case "goto-pending": S.tab="pending"; render(); break;
    case "toggle-add": S.showAdd=!S.showAdd; render(); break;
    case "cancel-add": S.showAdd=false; S.newBatch={home:"",doctor:"",date:today(),count:1}; render(); break;
    case "toggle-batch": S.openBatch=S.openBatch===bid?null:bid; render(); break;
    case "add-batch": doAddBatch(); break;
    case "pick-home": { const inp=document.getElementById("nb-home"); if(inp){ inp.value=el.dataset.val; S.newBatch.home=el.dataset.val; } const dd=document.getElementById("home-dropdown"); if(dd) dd.classList.remove("open"); break; }
    case "confirm-item": doConfirmItem(bid,iid); break;
    case "reject-item": doRejectItem(bid,iid); break;
    case "clear-item": doClearItem(bid,iid); break;
    case "clear-all": doClearAllConfirmed(bid); break;
    case "check-batch": doCheckBatch(bid); break;
    case "confirm-all": doConfirmAll(bid); break;
    case "cancel-batch": if(confirm("Mark this whole batch as cancelled? It moves to Home cancelled and records 0 claims.")) doCancelBatch(bid); break;
    case "reactivate-batch": doReactivateBatch(bid); break;
    case "add-rejected-item": doAddRejectedItem(bid); break;
    case "resubmit-item": doResubmitItem(bid,iid); break;
    case "set-rejection-type": doSetRejectionType(bid,iid,el.dataset.rtype); break;
    case "log-chase": doLogChase(bid,iid); break;
    case "escalate-item": doEscalateItem(bid,iid); break;
    case "save-invoice": doSaveInvoice(bid,iid); break;
    case "toggle-no-invoice": doToggleNoInvoice(bid,iid); break;
    case "conf-clear": S.confFrom=""; S.confTo=""; render(); break;
    case "enable-notify": enableNotify(); break;
    case "delete-batch": if(confirm("Delete this batch permanently? This cannot be undone.")) doDeleteBatch(bid); break;
  }
});

/* ═════════════════════════════════════════════
   STARTUP
═════════════════════════════════════════════ */
if(USE_FIREBASE){
  COL.onSnapshot(snap=>{ S.batches=snap.docs.map(d=>d.data()); render(); notifyOverdue(); },
    err=>{ console.error("Firestore listen failed",err); render(); });
}
render();
notifyOverdue();
// Re-check overdue/auto-escalation every 5 minutes so tabs stay current without a refresh
setInterval(()=>{ render(); notifyOverdue(); }, 5*60*1000);

/* PWA service worker */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{ navigator.serviceWorker.register("./sw.js").catch(()=>{}); });
}
</script>
</body>
</html>
